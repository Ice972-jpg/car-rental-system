<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                Car Rental System
            </a>

        </div>
    </nav>


    <!-- MAIN -->

    <div class="container py-5">
        <div
            id="alertBox"
            class="alert alert-success d-none"
        >
        </div>
        
        <div class="row mb-4">

    <div class="col-md-4">

        <div class="card bg-primary text-light p-3 text-center">

            <h5>Total Cars</h5>

            <h2 id="totalCars">
                0
            </h2>

        </div>

    </div>


    <div class="col-md-4">

        <div class="card bg-success text-light p-3 text-center">

            <h5>Available Cars</h5>

            <h2 id="availableCars">
                0
            </h2>

        </div>

    </div>


    <div class="col-md-4">

        <div class="card bg-warning text-dark p-3 text-center">

            <h5>Average Price</h5>

            <h2 id="averagePrice">
                $0
            </h2>

        </div>

    </div>

</div>

        <div class="row">

            <!-- FORM -->

            <div class="col-lg-4">

                <div class="card bg-secondary text-light shadow p-4">

                    <h3 class="mb-4" id="formTitle">
                         Add New Car
                    </h3>
                    
                    <input
                        type="text"
                        id="searchInput"
                        class="form-control mb-4"
                        placeholder="Search by brand or model..."
                >

                <select
                        id="sortSelect"
                        class="form-select mb-4"
                >
                    <option value="default">
                        Sort by
                    </option>

                    <option value="low">
                        Price: Low to High
                    </option>

                    <option value="high">
                        Price: High to Low
                    </option>
                </select>

                <select
    id="availabilityFilter"
    class="form-select mb-4"
>
    <option value="all">
        All Cars
    </option>

    <option value="available">
        Available Only
    </option>

    <option value="unavailable">
        Unavailable Only
    </option>
</select>
                >

                    <form id="carForm">

                        <div class="mb-3">
                            <label class="form-label">
                                Brand
                            </label>

                            <input
                                type="text"
                                id="brand"
                                class="form-control"
                                required
                            >
                        </div>


                        <div class="mb-3">
                            <label class="form-label">
                                Model
                            </label>

                            <input
                                type="text"
                                id="model"
                                class="form-control"
                                required
                            >
                        </div>


                        <div class="mb-3">
                            <label class="form-label">
                                Year
                            </label>

                            <input
                                type="number"
                                id="year"
                                class="form-control"
                                required
                            >
                        </div>


                        <div class="mb-3">
                            <label class="form-label">
                            <div class="form-check mb-3">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="available"
                                    checked
                                >

                                <label class="form-check-label">
                                    Available
                                </label>

                            </div>   
                                Price / day
                            </label>

                            <input
                                type="number"
                                id="price"
                                class="form-control"
                                required
                            >
                        </div>


                        <button class="btn btn-dark w-100">
                            Add Car
                        </button>

                    </form>

                </div>

            </div>


            <!-- CAR LIST -->

            <div class="col-lg-8">

                <div class="card bg-secondary text-light shadow p-4">

                    <h3 class="mb-4">
                        Available Cars
                    </h3>

                    <div id="carList" class="row g-3">

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
